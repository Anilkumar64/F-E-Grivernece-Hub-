services:
  v2-mongo:
    image: mongo:7.0
    restart: unless-stopped
    ports:
      - "${MONGO_HOST_PORT:-27019}:27017"
    env_file: .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    volumes:
      - v2-mongo-data:/data/db
    networks:
      - e-grievance-v2-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "-u", "${MONGO_USER}", "-p", "${MONGO_PASS}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  v2-ai-service:
    image: e-grievance-v2-ai:latest
    build:
      context: ./ai-service
      dockerfile: Dockerfilev2
    restart: unless-stopped
    env_file: .env
    ports:
      - "${AI_HOST_PORT:-8001}:8000"
    environment:
      MONGODB_URL: ${MONGODB_URL}
      MONGODB_DB: ${MONGODB_DB}
      AI_REQUIRE_DB: "true"
      BACKEND_ORIGIN: http://v2-backend:5000
      LOG_DIR: /app/logs
    volumes:
      - v2-ai-logs:/app/logs
    networks:
      - e-grievance-v2-net
    depends_on:
      v2-mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"

  v2-backend:
    image: e-grievance-v2-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfilev2
    restart: unless-stopped
    env_file: .env
    ports:
      - "${BACKEND_HOST_PORT:-5002}:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URL: ${MONGODB_URL}
      MONGODB_DB: ${MONGODB_DB}
      AI_SERVICE_URL: http://v2-ai-service:8000
      LOG_DIR: /app/logs
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      AI_SERVICE_SECRET: ${AI_SERVICE_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    volumes:
      - v2-uploads-data:/app/uploads
      - v2-backend-logs:/app/logs
    networks:
      - e-grievance-v2-net
    depends_on:
      v2-mongo:
        condition: service_healthy
      v2-ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  v2-frontend:
    image: e-grievance-v2-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfilev2
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-5175}:80"
    networks:
      - e-grievance-v2-net
    depends_on:
      v2-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

volumes:
  v2-mongo-data:
  v2-uploads-data:
  v2-backend-logs:
  v2-ai-logs:

networks:
  e-grievance-v2-net:
    driver: bridge
