services:
  app:
    build: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - redis
    environment:
      MONGODB_URL: mongodb://mongo:27017/EgrievanceHub
      REDIS_URL: redis://redis:6379

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mongo-data:
